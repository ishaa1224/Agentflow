<!doctype html>
<html lang="en" class="h-full">
  <head>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('agentflow_theme') || 'light';
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366F1'%3E%3Cpath d='M12 2L2 22h20L12 2zm0 4l6.5 13h-13L12 6z'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>AgentFlow AI - PDF Text Extraction Hub</title>
    <meta name="description" content="AgentFlow AI Foundation: A modern web interface for lightning-fast PDF text extraction and document preprocessing." />
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* Ensure default font selection is Inter */
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="min-h-full flex flex-col antialiased bg-[var(--bg-primary)] text-[var(--text-primary)] transition-colors duration-300">
    <div id="root" class="flex-grow flex flex-col"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

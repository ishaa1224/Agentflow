services:
  # FastAPI Backend Service
  - type: web
    name: agentflow-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        value: sqlite:///backend/agentflow.db
      - key: GEMINI_API_KEY
        value: "" # Set user Gemini API key in Render Dashboard env

  # React Frontend Service
  - type: web
    name: agentflow-ai-frontend
    env: static
    buildCommand: npm run build
    publishPath: frontend/dist
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
